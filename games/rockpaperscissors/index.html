<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Include Chart.js library -->
</head>
<body>
    <div id="spawn-menu">
        <form id="spawn-form">
            <input type="text" id="username" placeholder="Enter your username" maxlength="15">
            <div>
                <label>
                    <input type="radio" name="player-icon" value="rock.png" required>
                    Rock
                </label>
                <label>
                    <input type="radio" name="player-icon" value="paper.png">
                    Paper
                </label>
                <label>
                    <input type="radio" name="player-icon" value="scissors.png">
                    Scissors
                </label>
            </div>
            <button type="submit">Play</button>
        </form>
    </div>
    <div id="game-container" style="display: none;">
        <div id="arena">
            <img id="player" src="img/player.png" alt="Player">
            <div id="username-display"></div>
            <div id="npcs"></div>
        </div>
        <div id="score-display">Score: 0</div>
        <div id="fpsDisplay"></div>
        <canvas id="npcChart"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
